<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔑 김포B 공비</title>
    <style>
        :root { --bg-color: #f0f2f5; --card-bg: #ffffff; --primary: #3b82f6; --text-main: #111827; --accent: #ef4444; --border: #e5e7eb; --step-bg: #f3f4f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; padding-bottom: 90px; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-buttons-container { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .nav-btn { background: var(--card-bg); border: 2px solid var(--border); padding: 15px 0; border-radius: 16px; cursor: pointer; font-weight: bold; }
        .gps-section { margin-bottom: 20px; display: none; }
        .gps-buttons { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; }
        .gps-btn { background: #e0e7ff; color: #4f46e5; border: none; padding: 14px 20px; border-radius: 16px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .step-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 15px; margin-bottom: 25px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .select-btn { background: var(--step-bg); border: 1px solid var(--border); padding: 18px 5px; border-radius: 16px; font-weight: bold; cursor: pointer; }
        .card-list { display: flex; flex-direction: column; gap: 14px; width: 100%; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 18px; border: 1px solid var(--border); }
        .line-info { font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        .pwd-box { background: rgba(239, 68, 68, 0.03); border: 1.5px solid var(--accent); padding: 12px; border-radius: 12px; font-weight: 700; color: var(--accent); word-break: break-all; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-area"><h1>🔑 김포B 공비</h1></div>
    <div id="navContainer" class="nav-buttons-container">
        <button class="nav-btn" onclick="goBack()">⬅️ 뒤로</button>
        <button class="nav-btn" onclick="resetSteps()">🏠 홈</button>
    </div>
    <div id="gpsSection" class="gps-section"><div class="gps-buttons" id="gpsButtons"></div></div>
    <div id="stepContainer" class="step-container"><div id="buttonGrid" class="btn-grid">로딩 중...</div></div>
    <div id="cardList" class="card-list"></div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxMc74RsguWtr-4Nx3w2OeTctpb8-ILGN5j41kW97YNY-0KMX4FOfdvQUKDL0UGTbxk/exec";
    let data = [], locations = {}, currentStep = 1, selectedRegion = "", selectedApt = "";

    function initApp() {
        const cachedData = localStorage.getItem('cachedData');
        const cachedLocs = localStorage.getItem('cachedLocs');
        if (cachedData && cachedLocs) {
            data = JSON.parse(cachedData);
            locations = JSON.parse(cachedLocs);
            resetSteps();
        }
        loadData();
    }

    async function loadData() {
        try {
            const [sheetRes, locRes] = await Promise.all([fetch(GAS_URL), fetch("locations.json?_=" + Date.now())]);
            data = await sheetRes.json();
            locations = await locRes.json();
            localStorage.setItem('cachedData', JSON.stringify(data));
            localStorage.setItem('cachedLocs', JSON.stringify(locations));
            resetSteps();
            initGPS();
        } catch (e) { console.error("Update failed", e); }
    }

    function initGPS() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition((pos) => {
            if (pos.coords.accuracy > 50) return;
            const uLat = pos.coords.latitude, uLon = pos.coords.longitude;
            const targets = Object.keys(locations).map(key => ({
                name: key, dist: Math.sqrt((locations[key].lat-uLat)**2 + (locations[key].lon-uLon)**2)
            })).sort((a,b) => a.dist - b.dist).slice(0, 3);
            
            const btnArea = document.getElementById('gpsButtons');
            btnArea.innerHTML = '';
            targets.forEach(t => {
                const btn = document.createElement('button'); btn.className = 'gps-btn'; btn.textContent = `📍 ${t.name}`;
                btn.onclick = () => {
                    const match = data.find(i => i.아파트 === t.name || i.동 === t.name);
                    if (match) { selectedRegion = match.지역; match.아파트 === t.name ? selectAptStep(t.name) : selectDongStep(t.name); }
                };
                btnArea.appendChild(btn);
            });
            document.getElementById('gpsSection').style.display = 'block';
        }, null, { enableHighAccuracy: true });
    }

    function resetSteps() { currentStep = 1; document.getElementById('navContainer').style.display = 'none'; renderGrid([...new Set(data.map(i => i.지역).filter(Boolean))], (r) => selectRegionStep(r)); }
    function selectRegionStep(region) { currentStep = 2; document.getElementById('navContainer').style.display = 'grid'; selectedRegion = region; renderGrid([...new Set(data.filter(i => i.지역 === region).map(i => i.아파트).filter(Boolean))], (a) => selectAptStep(a)); }
    function selectAptStep(apt) { currentStep = 3; selectedApt = apt; renderGrid([...new Set(data.filter(i => i.아파트 === apt).map(i => i.동).filter(Boolean))], (d) => selectDongStep(d)); }
    
    // 최종 라인별 통합 정렬 로직
    function selectDongStep(dong) {
        currentStep = 4; 
        document.getElementById('stepContainer').style.display = 'none';
        const list = data.filter(i => i.동 === dong);
        const grouped = list.reduce((acc, curr) => {
            if (!acc[curr.라인]) acc[curr.라인] = [];
            acc[curr.라인].push(curr.비번);
            return acc;
        }, {});
        const lines = Object.keys(grouped).sort((a, b) => parseInt(a.replace(/[^0-9]/g, '')) - parseInt(b.replace(/[^0-9]/g, '')));
        
        document.getElementById('cardList').innerHTML = lines.map(line => `
            <div class="card">
                <div class="line-info">${line}라인</div>
                <div class="pwd-box">${grouped[line].join(' / ')}</div>
            </div>`).join('');
    }

    function renderGrid(arr, callback) { const grid = document.getElementById('buttonGrid'); grid.innerHTML = ''; arr.forEach(item => { const btn = document.createElement('button'); btn.className = 'select-btn'; btn.textContent = item; btn.onclick = () => callback(item); grid.appendChild(btn); }); document.getElementById('stepContainer').style.display = 'block'; document.getElementById('cardList').innerHTML = ''; }
    function goBack() { if(currentStep === 2) resetSteps(); else if(currentStep === 3) selectRegionStep(selectedRegion); else if(currentStep === 4) selectAptStep(selectedApt); }

    initApp();
</script>
</body>
</html>
