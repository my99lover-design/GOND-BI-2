<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔑 공동현관 통합 관리 매니저</title>
    <style>
        :root {
            --bg-color: #f0f2f5; --card-bg: #ffffff; --primary: #3b82f6; --text-main: #111827;
            --text-sub: #6b7280; --accent: #ef4444; --border: #e5e7eb; --gps-btn-bg: #e0e7ff; --gps-btn-text: #4f46e5;
        }
        [data-theme="dark"] {
            --bg-color: #111827; --card-bg: #1f2937; --primary: #60a5fa; --text-main: #f9fafb;
            --text-sub: #9ca3af; --accent: #f87171; --border: #374151; --gps-btn-bg: #312e81; --gps-btn-text: #c7d2fe;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; transition: all 0.3s; }
        .container { width: 100%; max-width: 500px; padding-bottom: 80px; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.3rem; margin: 0; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; cursor: pointer; color: var(--text-main); font-size: 0.85rem; }
        
        /* GPS */
        .gps-section { margin-bottom: 25px; display: none; }
        .gps-title { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 8px; font-weight: bold; }
        .gps-buttons { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .gps-btn { background: var(--gps-btn-bg); color: var(--gps-btn-text); border: none; padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; cursor: pointer; white-space: nowrap; }

        /* 검색창 */
        .search-container { position: sticky; top: 10px; z-index: 100; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 15px; font-size: 1rem; border: 2px solid var(--border); border-radius: 16px; box-sizing: border-box; outline: none; background-color: var(--card-bg); color: var(--text-main); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* 카드 및 수정버튼 */
        .card-list { display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 16px; border: 1px solid var(--border); position: relative; }
        .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
        .apt-name { font-weight: 800; font-size: 1.1rem; }
        .line-info { font-size: 0.85rem; color: var(--text-sub); margin-top: 2px; }
        .region-tag { background: var(--gps-btn-bg); color: var(--primary); padding: 4px 8px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; }
        .card-body { font-size: 0.9rem; border-top: 1px solid var(--border); padding-top: 10px; display: flex; justify-content: space-between; align-items: end; }
        .pwd-highlight { font-size: 1.25rem; font-weight: 800; color: var(--accent); }
        .edit-trigger-btn { background: none; border: 1px solid var(--border); color: var(--text-sub); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }

        /* 하단 고정 추가 버튼 */
        .add-floating-btn { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; border: none; width: 50px; height: 50px; border-radius: 25px; font-size: 1.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; z-index: 200; }

        /* 입력/수정 모달창 팝업 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; box-sizing: border-box; }
        .modal h3 { margin-top: 0; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.8rem; color: var(--text-sub); }
        .form-group input { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-color); color: var(--text-main); font-size: 0.95rem; }
        .modal-buttons { display: flex; gap: 8px; margin-top: 15px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.95rem; }
        .btn-submit { background: var(--primary); color: white; }
        .btn-cancel { background: var(--border); color: var(--text-main); }
        .btn-delete { background: var(--accent); color: white; }
        .no-result { text-align: center; color: var(--text-sub); margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>🔑 김포B 공비</h1>
        <button id="themeToggle" class="theme-toggle">🌙 다크 모드</button>
    </div>

    <div id="gpsSection" class="gps-section">
        <div class="gps-title">📍 내 주변 건물 (GPS)</div>
        <div id="gpsButtons" class="gps-buttons"></div>
    </div>
    
    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="아파트, 동, 라인 검색...">
    </div>
    
    <div id="cardList" class="card-list">데이터를 불러오는 중... ⏳</div>
</div>

<button class="add-floating-btn" onclick="openAddModal()">+</button>

<div id="editorModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">데이터 관리</h3>
        <input type="hidden" id="formRowId">
        <div class="form-group"><label>지역</label><input type="text" id="formRegion"></div>
        <div class="form-group"><label>아파트 이름</label><input type="text" id="formApt"></div>
        <div class="form-group"><label>공동현관 기기종류</label><input type="text" id="formType"></div>
        <div class="form-group"><label>동</label><input type="text" id="formDong"></div>
        <div class="form-group"><label>라인</label><input type="text" id="formLine"></div>
        <div class="form-group"><label>비밀번호</label><input type="text" id="formPwd"></div>
        
        <div class="modal-buttons">
            <button class="modal-btn btn-submit" onclick="submitForm()">저장</button>
            <button id="deleteBtn" class="modal-btn btn-delete" onclick="deleteData()">삭제</button>
            <button class="modal-btn btn-cancel" onclick="closeModal()">취소</button>
        </div>
    </div>
</div>

<script>
    // ⚠️ 아래 큰따옴표 안에 아까 발급받은 진짜 구글 웹앱 주소(https://script.google.com/...)를 붙여넣으세요!
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxMc74RsguWtr-4Nx3w2OeTctpb8-ILGN5j41kW97YNY-0KMX4FOfdvQUKDL0UGTbxk/exec";
    
    const LOCATIONS_JSON_URL = "locations.json"; 

    let data = [];
    let locations = {};
    const searchInput = document.getElementById('searchInput');
    const cardList = document.getElementById('cardList');
    const themeToggle = document.getElementById('themeToggle');

    const currentTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.textContent = currentTheme === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
    themeToggle.addEventListener('click', () => {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        themeToggle.textContent = theme === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
    });

    function getDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return Infinity;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function initGPS() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition((position) => {
            const uLat = position.coords.latitude; const uLon = position.coords.longitude;
            const uniqueApts = {};
            data.forEach(item => {
                const loc = locations[item.아파트];
                if (item.아파트 && loc && !uniqueApts[item.아파트]) {
                    uniqueApts[item.아파트] = { name: item.아파트, dist: getDistance(uLat, uLon, loc.lat, loc.lon) };
                }
            });
            const sorted = Object.values(uniqueApts).filter(a => a.dist !== Infinity).sort((a,b) => a.dist - b.dist).slice(0,3);
            if (sorted.length > 0) {
                const btnArea = document.getElementById('gpsButtons');
                btnArea.innerHTML = '';
                sorted.forEach(apt => {
                    const btn = document.createElement('button'); btn.className = 'gps-btn';
                    btn.textContent = `🏢 ${apt.name} (${apt.dist < 1 ? Math.round(apt.dist*1000)+'m' : apt.dist.toFixed(1)+'km'})`;
                    btn.addEventListener('click', () => { searchInput.value = apt.name; renderCards(apt.name); });
                    btnArea.appendChild(btn);
                });
                document.getElementById('gpsSection').style.display = 'block';
            }
        });
    }

    async function loadData() {
        try {
            cardList.innerHTML = "데이터를 동기화 중... ⏳";
            const sheetRes = await fetch(GAS_WEB_APP_URL);
            data = await sheetRes.json();
            
            try {
                const locRes = await fetch(LOCATIONS_JSON_URL + `?_=${Date.now()}`);
                locations = await locRes.json();
            } catch(e) { console.log(e); }

            renderCards();
            initGPS();
        } catch (error) {
            cardList.innerHTML = '<p class="no-result">통신 실패 ❌ 구글 웹앱 URL을 확인하세요.</p>';
        }
    }

    function renderCards(filterText = '') {
        cardList.innerHTML = '';
        const query = filterText.toLowerCase().trim();
        const filtered = data.filter(item => {
            if (!query) return true;
            return (item.아파트 && item.아파트.toLowerCase().includes(query)) || (item.지역 && item.지역.toLowerCase().includes(query)) || (item.동 && String(item.동).includes(query)) || (item.라인 && String(item.라인).includes(query));
        });

        if (filtered.length === 0) { cardList.innerHTML = '<p class="no-result">결과 없음 🔍</p>'; return; }

        filtered.forEach(item => {
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="apt-info">
                        <div class="apt-name">${item.아파트 || ''} ${item.동 || ''}동</div>
                        <div class="line-info">${item.라인 || ''} 라인</div>
                    </div>
                    <span class="region-tag">${item.지역 || ''}</span>
                </div>
                <div class="card-body">
                    <div>
                        <div class="type-info">종류: ${item.공동 || ''}</div>
                        <div class="pwd-highlight">${item.비번 || ''}</div>
                    </div>
                    <button class="edit-trigger-btn" onclick="openEditModal(${item.rowId})">⚙️ 수정</button>
                </div>
            `;
            cardList.appendChild(card);
        });
    }

    const modal = document.getElementById('editorModal');
    function closeModal() { modal.style.display = 'none'; }
    
    function openAddModal() {
        document.getElementById('modalTitle').textContent = "🆕 비밀번호 추가";
        document.getElementById('formRowId').value = "";
        document.getElementById('formRegion').value = "";
        document.getElementById('formApt').value = searchInput.value;
        document.getElementById('formType').value = "";
        document.getElementById('formDong').value = "";
        document.getElementById('formLine').value = "";
        document.getElementById('formPwd').value = "";
        document.getElementById('deleteBtn').style.display = 'none';
        modal.style.display = 'flex';
    }

    function openEditModal(rowId) {
        const item = data.find(d => d.rowId === rowId);
        if (!item) return;
        document.getElementById('modalTitle').textContent = "⚙️ 데이터 수정";
        document.getElementById('formRowId').value = item.rowId;
        document.getElementById('formRegion').value = item.지역 || '';
        document.getElementById('formApt').value = item.아파트 || '';
        document.getElementById('formType').value = item.공동 || '';
        document.getElementById('formDong').value = item.동 || '';
        document.getElementById('formLine').value = item.라인 || '';
        document.getElementById('formPwd').value = item.비번 || '';
        document.getElementById('deleteBtn').style.display = 'block';
        modal.style.display = 'flex';
    }

    async function submitForm() {
        const rowId = document.getElementById('formRowId').value;
        const payload = {
            action: rowId ? 'update' : 'add',
            rowId: rowId,
            지역: document.getElementById('formRegion').value,
            아파트: document.getElementById('formApt').value,
            공동: document.getElementById('formType').value,
            동: document.getElementById('formDong').value,
            라인: document.getElementById('formLine').value,
            비번: document.getElementById('formPwd').value
        };

        closeModal();
        cardList.innerHTML = "구글 시트에 동기화 중... ⏳";
        
        try {
            await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            loadData();
        } catch (e) { alert("저장 실패 ❌"); loadData(); }
    }

    async function deleteData() {
        if(!confirm("정말 이 비밀번호를 삭제하시겠습니까?")) return;
        const rowId = document.getElementById('formRowId').value;
        closeModal();
        cardList.innerHTML = "데이터 삭제 중... ⏳";
        
        try {
            await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', rowId: rowId }) });
            loadData();
        } catch (e) { alert("삭제 실패 ❌"); loadData(); }
    }

    searchInput.addEventListener('input', (e) => renderCards(e.target.value));
    loadData();
</script>
</body>
</html>
