<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔑 넘버원 김포B 공비</title>
    <style>
        :root { --bg-color: #f0f2f5; --card-bg: #ffffff; --primary: #3b82f6; --text-main: #111827; --text-sub: #6b7280; --accent: #ef4444; --border: #e5e7eb; --gps-btn-bg: #e0e7ff; --gps-btn-text: #4f46e5; --step-bg: #f3f4f6; }
        [data-theme="dark"] { --bg-color: #111827; --card-bg: #1f2937; --primary: #60a5fa; --text-main: #f9fafb; --text-sub: #9ca3af; --accent: #f87171; --border: #374151; --gps-btn-bg: #312e81; --gps-btn-text: #c7d2fe; --step-bg: #374151; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; padding-bottom: 40px; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; cursor: pointer; color: var(--text-main); }
        .nav-buttons-container { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .nav-btn { background: var(--card-bg); border: 2px solid var(--border); padding: 15px; border-radius: 16px; cursor: pointer; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .select-btn { background: var(--step-bg); border: 1px solid var(--border); padding: 18px 5px; border-radius: 16px; font-weight: bold; cursor: pointer; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 14px; }
        .pwd-box { background: rgba(239, 68, 68, 0.03); border: 1.5px solid var(--accent); padding: 12px; border-radius: 12px; margin-bottom: 4px; font-weight: bold; color: var(--accent); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 24px; width: 92%; max-width: 440px; }
        .form-group { margin-bottom: 16px; }
        .form-group input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-submit { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>넘버원🥇<div style="font-size: 1rem; color: var(--text-sub);">김포B 공비</div></h1>
        <button id="themeToggle" class="theme-toggle">밝기전환</button>
    </div>

    <div id="navContainer" class="nav-buttons-container">
        <button class="nav-btn" onclick="goBack()">⬅️ 뒤로</button>
        <button class="nav-btn" onclick="resetSteps()">🏠 홈</button>
    </div>

    <div id="stepContainer" class="step-container">
        <div id="buttonGrid" class="btn-grid">데이터 불러오는 중...</div>
    </div>
    <div id="cardList"></div>
</div>

<div id="editorModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">🔑 비밀번호 수정</h3>
        <input type="hidden" id="formRowId">
        <div class="form-group"><input type="text" id="formPwd"></div>
        <div class="modal-buttons">
            <button class="modal-btn btn-submit" onclick="submitForm()">저장</button>
            <button class="modal-btn" onclick="closeModal()">취소</button>
        </div>
    </div>
</div>

<script>
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyFbQUILKYrMZEfGl8tXPHThYEK1ncyU0JV36Dbfiqi5cdFRKY06PQUS4IwHDDLW8boIA/exec";
let data = [];
let state = { step: 1, region: "", apt: "", dong: "" };

// 1. 공통 유틸리티
const requestAPI = async (action, payload) => {
    try {
        await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, ...payload }) });
    } catch (e) { alert("통신 실패! 동기화합니다."); loadData(); }
};

const renderButtons = (items, onClick) => {
    buttonGrid.innerHTML = '';
    items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'select-btn';
        btn.textContent = item;
        btn.onclick = () => onClick(item);
        buttonGrid.appendChild(btn);
    });
};

const closeModal = () => document.getElementById('editorModal').style.display = 'none';

// 2. 로직 함수
async function loadData() {
    const cached = localStorage.getItem('pwd_data_cache');
    if (cached) { data = JSON.parse(cached); refreshUI(); }
    
    try {
        const res = await fetch(GAS_WEB_APP_URL);
        const newData = await res.json();
        if (JSON.stringify(data) !== JSON.stringify(newData)) {
            data = newData;
            localStorage.setItem('pwd_data_cache', JSON.stringify(newData));
            refreshUI();
        }
    } catch (e) { buttonGrid.innerHTML = '데이터 로딩 실패'; }
}

function refreshUI() {
    if (state.step === 1) {
        const regions = [...new Set(data.map(i => i.지역).filter(Boolean))];
        renderButtons(regions, (r) => { state.step = 2; state.region = r; refreshUI(); });
    } else if (state.step === 2) {
        const apts = [...new Set(data.filter(i => i.지역 === state.region).map(i => i.아파트).filter(Boolean))];
        renderButtons(apts, (a) => { state.step = 3; state.apt = a; refreshUI(); });
    } else if (state.step === 3) {
        const dongs = [...new Set(data.filter(i => i.아파트 === state.apt).map(i => i.동).filter(Boolean))].sort((a,b)=>a-b);
        renderButtons(dongs, (d) => { state.step = 4; state.dong = d; refreshUI(); });
    } else {
        document.getElementById('stepContainer').style.display = 'none';
        cardList.innerHTML = data.filter(i => i.아파트 === state.apt && i.동 == state.dong).map(item => `
            <div class="card">
                <div style="font-weight:bold">${item.라인}라인</div>
                <div class="pwd-box">${item.비번}</div>
                <button onclick="openModal(${item.rowId})">수정</button>
            </div>
        `).join('');
    }
    document.getElementById('navContainer').style.display = state.step > 1 ? 'grid' : 'none';
}

function openModal(rowId) {
    const item = data.find(d => d.rowId == rowId);
    document.getElementById('formRowId').value = rowId;
    document.getElementById('formPwd').value = item.비번;
    document.getElementById('editorModal').style.display = 'flex';
}

async function submitForm() {
    const rowId = document.getElementById('formRowId').value;
    const newPwd = document.getElementById('formPwd').value;
    const item = data.find(d => d.rowId == rowId);
    if(item) item.비번 = newPwd;
    localStorage.setItem('pwd_data_cache', JSON.stringify(data));
    refreshUI();
    closeModal();
    await requestAPI('update', { rowId, 비번: newPwd });
}

function resetSteps() { state = { step: 1 }; document.getElementById('stepContainer').style.display = 'block'; cardList.innerHTML = ''; refreshUI(); }
function goBack() { state.step--; refreshUI(); }

loadData();
</script>
</body>
</html>
